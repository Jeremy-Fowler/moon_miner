<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="icon" href="https://bcw.blob.core.windows.net/public/img/9977764104160066">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We" crossorigin="anonymous">
  <link rel="stylesheet" href="//cdn.materialdesignicons.com/5.4.55/css/materialdesignicons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style/main.css">
  <link rel="stylesheet" href="assets/style/style.css">

  <title>moon_miner</title>
</head>

<body class="bg-image">
  <header>
    <div class="container-fluid">
      <div class="row">
        <div class="col-12 d-flex justify-content-center bungee mt-2">
          <h1 class="text-light">Moon Miner</h1>
        </div>
      </div>
    </div>
  </header>
  <main>
    <div class="container-fluid">
      <div class="row justify-content-center">
        <div class="col-5 d-flex justify-content-center">
          <img onclick="app.cheeseController.mine()" src="../assets/img/swiss-moon 1.png" alt="" class="img-fluid moon">
        </div>
      </div>
      <!-- CHEESE -->
      <div class="row justify-content-center text-light bungee align-items-end">
        <div class="col-1 p-0 stats">
          <div
            class="p-2 d-flex bg-warning-dark justify-content-between border-top border-start border-warning rounded-top-start">
            <span>+ <span id="click-power">1</span></span>
            <span><i class="mdi mdi-cursor-pointer"></i></span>
          </div>
        </div>
        <div class="col-2 p-0 cheese">
          <div class="p-2 d-flex bg-warning justify-content-between rounded-top-end rounded-top-start">
            <span><i class="mdi mdi-cheese"></i></span>
            <span id="cheese">0</span>
          </div>
        </div>
        <div class="col-1 p-0 stats">
          <div
            class="p-2 d-flex bg-warning-dark justify-content-between border-top border-end border-warning rounded-top-end">
            <span><i class="mdi mdi-timer-outline"></i></span>
            <span id="auto-power">0</span>
          </div>
        </div>
      </div>
      <!-- SHOP AND STATS -->
      <div class="row justify-content-center text-light">
        <div class="col-11 bg-warning rounded">
          <div class="row my-2 p-2 justify-content-between">
            <div class="col-6">
              <div class="row p-2 bg-warning-light rounded mx-1">
                <div class="col-6">
                  <div class="bungee mb-3">
                    Click Upgrades
                  </div>
                  <div class="d-flex"><button onclick="app.upgradesController.buyUpgrade('knife')"
                      class="btn btn-primary text-light mb-3 fs-4 fw-bold">
                      <span id="knife-price">50</span><i class="mdi mdi-cheese"></i></button>
                    <div class="ms-2">
                      <div>
                        Knife
                      </div>
                      <div>
                        +1
                      </div>
                    </div>
                  </div>
                  <div class="d-flex"><button onclick="app.upgradesController.buyUpgrade('drill')"
                      class="btn btn-primary text-light mb-3 fs-4 fw-bold"><span id="drill-price">50</span> <i
                        class="mdi mdi-cheese"></i></button>
                    <div class="ms-2">
                      <div>
                        Drill
                      </div>
                      <div>
                        +5
                      </div>
                    </div>
                  </div>

                </div>
                <div class="col-6">
                  <div class="bungee mb-3">
                    Automatic Upgrades
                  </div>
                  <div class="d-flex"><button onclick="app.upgradesController.buyUpgrade('mouse')"
                      class="btn btn-danger text-light mb-3 fs-4 fw-bold"><span id="mouse-price">50</span> <i
                        class="mdi mdi-cheese"></i></button>
                    <div class="ms-2">
                      <div>
                        Mousetronaut
                      </div>
                      <div>
                        +10 / 3s
                      </div>
                    </div>
                  </div>
                  <div class="d-flex"><button onclick="app.upgradesController.buyUpgrade('spaceStation')"
                      class="btn btn-danger text-light mb-3 fs-4 fw-bold"><span id="spaceStation-price">50</span> <i
                        class="mdi mdi-cheese"></i></button>
                    <div class="ms-2">
                      <div>
                        Space Station
                      </div>
                      <div>
                        +100 / 3s
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-6">
              <div class="row p-2 bg-warning-light rounded mx-1 grow">
                <div class="col-6 d-flex flex-column justify-content-between">
                  <div class="bungee mb-3">
                    Click Stats
                  </div>
                  <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="d-flex justify-content-between">
                      <span class="fs-4 border border-light rounded px-2" id="knife-quantity">0</span>
                      <span class="fs-5 ps-4">Knives</span>
                    </div>
                    <div class="d-flex justify-content-between me-2">
                      <span class="fs-4"> <i class="mdi mdi-arrow-right"></i></span>
                      <span class="fs-4 ms-4 border border-light rounded px-2" id="knife-power">0</span>
                    </div>
                  </div>
                  <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="d-flex justify-content-between">
                      <span class="fs-4 border border-light rounded px-2" id="drill-quantity">0</span>
                      <span class="fs-5 ps-4">Drills</span>
                    </div>
                    <div class="d-flex justify-content-between me-2">
                      <span class="fs-4"> <i class="mdi mdi-arrow-right"></i></span>
                      <span class="fs-4 ms-4 border border-light rounded px-2" id="drill-power">0</span>
                    </div>
                  </div>
                </div>
                <div class="col-6 d-flex flex-column justify-content-between">
                  <div class="bungee mb-3">
                    Auto Stats
                  </div>
                  <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="d-flex justify-content-between">
                      <span class="fs-4 border border-light rounded px-2" id="mouse-quantity">0</span>
                      <span class="fs-5 ps-4">Mouses</span>
                    </div>
                    <div class="d-flex justify-content-between me-2">
                      <span class="fs-4"> <i class="mdi mdi-timer-outline"></i></span>
                      <span class="fs-4 ms-4 border border-light rounded px-2" id="mouse-power">0</span>
                    </div>
                  </div>
                  <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="d-flex justify-content-between">
                      <span class="fs-4 border border-light rounded px-2" id="spaceStation-quantity">0</span>
                      <span class="fs-5 ps-4">Stations</span>
                    </div>
                    <div class="d-flex justify-content-between me-2">
                      <span class="fs-4"> <i class="mdi mdi-timer-outline"></i></span>
                      <span class="fs-4 ms-4 border border-light rounded px-2" id="spaceStation-power">0</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-U1DAWAznBHeqEIlVSCgzq+c9gqGAJn5c/t99JyeKa9xxaYpSvHU5awsuZVVFIhvj"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.3.10/dist/sweetalert2.all.min.js"
    integrity="sha256-hw7v8jZF/rFEdx1ZHepT4D73AFTHLu/P9kEyrNesRyc=" crossorigin="anonymous"></script>
  <script src="app/main.js" type="module"></script>
</body>

</html>
